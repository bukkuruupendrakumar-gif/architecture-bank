{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2 class="text-center mb-4">📅 Book Design</h2>

    <div class="card p-4 shadow">

        <!-- ✅ IMPORTANT: use design.id (NOT item.id) -->
        <form method="POST" action="/save-booking/{{design.id}}/">
            {% csrf_token %}

            <!-- 👤 CUSTOMER DETAILS -->
            <label>Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter your name" required>

            <label class="mt-2">Phone</label>
            <input type="text" name="phone" class="form-control" placeholder="Enter phone number" required>

            <label class="mt-2">Address</label>
            <textarea name="address" class="form-control" placeholder="Enter address" required></textarea>

            <!-- 📅 EXTRA (your old fields) -->
            <label class="mt-3">Select Date</label>
            <input type="date" name="date" class="form-control">

            <label class="mt-2">Select Slot</label>
            <select name="slot" class="form-control">
                <option>10AM - 11AM</option>
                <option>11AM - 12PM</option>
                <option>2PM - 3PM</option>
            </select>

            <br>

            <button class="btn btn-success w-100">
                💳 Proceed to Payment
            </button>

        </form>

    </div>

    <!-- 🔙 BACK -->
    <div class="text-center mt-3">
        <a href="/dashboard/" class="btn btn-secondary">⬅ Back</a>
    </div>

</div>

{% endblock %}
