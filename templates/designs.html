<!DOCTYPE html>
<html>

<head>
    <title>Designs</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Designs</h2>

    <!-- 🔗 Wishlist Page Button -->
    <div class="text-end mb-3">
        <a href="/wishlist-page/" class="btn btn-warning">⭐ My Wishlist</a>
    </div>

    <div class="row">

        {% for d in designs %}
        <div class="col-md-4 mb-4">

            <div class="card">

                <!-- IMAGE -->
                <img src="{{ d.image.url }}" class="card-img-top">

                <div class="card-body text-center">

                    <h5>{{ d.name }}</h5>
                    <p>{{ d.description }}</p>

                    <!-- ❤️ LIKE -->
                    <a href="/like/{{d.id}}/" class="btn btn-outline-danger btn-sm">
                        ❤️ {{ d.total_likes }}
                    </a>

                    <!-- ⭐ WISHLIST (AJAX) -->
                    <button onclick="wishlistItem({{d.id}})" class="btn btn-outline-warning btn-sm">
                        ⭐ Wishlist
                    </button>

                    <!-- ⚡ QUICK BOOK -->
                    <button onclick="bookItem({{d.id}})" class="btn btn-dark btn-sm">
                        Quick Book
                    </button>

                    <!-- 🧾 FULL BOOKING FLOW -->
                    <a href="/booking/{{d.id}}/" class="btn btn-success btn-sm mt-2">
                        Book with Details
                    </a>

                </div>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

<!-- ✅ AJAX SCRIPT -->
<script>
function getCSRFToken() {
    return document.querySelector('[name=csrfmiddlewaretoken]').value;
}

// 📅 QUICK BOOK (AJAX)
function bookItem(id){
    fetch(`/book/${id}/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': getCSRFToken()
        }
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "booked"){
            alert("✅ Booked Successfully");
        } else if(data.status === "already_booked"){
            alert("⚠️ Already Booked");
        } else {
            alert("❌ Error");
        }
    });
}

// ⭐ WISHLIST (AJAX)
function wishlistItem(id){
    fetch(`/wishlist/${id}/`)
    .then(res => res.json())
    .then(data => {
        if(data.status === "added"){
            alert("⭐ Added to Wishlist");
        } else {
            alert("❌ Removed from Wishlist");
        }
    });
}
</script>

<!-- CSRF TOKEN (hidden) -->
<form style="display:none;">
    {% csrf_token %}
</form>

</body>
</html>
