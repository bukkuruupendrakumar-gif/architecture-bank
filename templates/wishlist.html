Remove
</a><!DOCTYPE html>
<html>

<head>
    <title>My Wishlist</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">⭐ Your Wishlist</h2>

    <div class="row">

        {% for w in wishes %}
        <div class="col-md-4 mb-4">

            <div class="card p-3 text-center">

                <!-- 📦 DESIGN NAME -->
                <h5>{{ w.design.name }}</h5>

                <!-- 📝 DESCRIPTION -->
                <p>{{ w.design.description }}</p>

                <!-- 📅 BOOK -->
                <a href="/booking/{{w.design.id}}/" class="btn btn-success btn-sm mb-2">
                    📅 Book Now
                </a>

                <!-- ❌ REMOVE (uses same toggle URL) -->
                <button onclick="removeWishlist({{w.design.id}})" class="btn btn-danger btn-sm">
                    Remove
                </button>

            </div>

        </div>
        {% empty %}
        <h4 class="text-center">No items in wishlist 😢</h4>
        {% endfor %}

    </div>

    <!-- 🔙 BACK -->
    <div class="text-center mt-4">
        <a href="/dashboard/" class="btn btn-dark">⬅ Back to Dashboard</a>
    </div>

</div>

<!-- ✅ JS -->
<script>
function removeWishlist(id){
    fetch(`/wishlist/${id}/`)
    .then(res => res.json())
    .then(data => {
        alert("Removed from wishlist");
        location.reload(); // refresh page
    });
}
</script>

</body>
</html>
