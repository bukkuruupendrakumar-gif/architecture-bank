{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <!-- Animation -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#141e30,#243b55);
            font-family:Arial;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:10px;
            width:350px;
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#243b55;
            color:white;
            border:none;
            cursor:pointer;
        }

        a{
            display:block;
            margin-top:10px;
            text-decoration:none;
            color:#243b55;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="login-box animate__animated animate__zoomIn">

    <h2>Architecture Design Bank</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <!-- Signup Link -->
    <a href="/signup/">Don't have an account? Signup</a>

</div>

</body>
</html>
